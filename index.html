<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSEUF-CI Employees CRUD</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <div class="header-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold"></i>Kitchen Menu</h1>
        </div>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center mb-5">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow-lg">
                    <div class="card-header bg-dark text-white p-3">
                        <h5 class="mb-0"><i class="bi bi-journal-plus me-2 text-gold"></i>Manage Menu Item</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="employeeForm">
                            <input type="hidden" name="ID" id="ID">

                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label for="itemName" class="form-label fw-bold text-muted small uppercase">Dish Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-card-text"></i></span>
                                        <input type="text" class="form-control form-control-lg" name="itemName" id="itemName" placeholder="Dish Name">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="itemCode" class="form-label fw-bold text-muted small">Dish Code</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-hash"></i></span>
                                        <input type="text" class="form-control form-control-lg" name="itemCode" id="itemCode" placeholder="123456">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="originalPrice" class="form-label fw-bold text-muted small">Base Price (₱)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-cash"></i></span>
                                        <input type="number" class="form-control form-control-lg" name="originalPrice" id="originalPrice" placeholder="0.00">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label for="discountPrice" class="form-label fw-bold text-muted small">Discount Price (₱)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-tag text-success"></i></span>
                                        <input type="number" class="form-control form-control-lg" name="discountPrice" id="discountPrice" placeholder="0.00">
                                    </div>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-muted">Dish Image URL</label>
                                    <input type="text" class="form-control" id="itemImage" placeholder="Paste image link here">
                                </div>

                            </div>
                                
                            <div class="d-flex gap-2 justify-content-end mt-4">
                                <button type="button" class="btn btn-dark px-4 py-2" id="upt">
                                    <i class="bi bi-arrow-clockwise me-2"></i>Update Dish
                                </button>
                                <button type="button" class="btn btn-gold px-4 py-2" id="add">
                                    <i class="bi bi-plus-lg me-2"></i>Add to Menu
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
                        <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-list-ul me-2"></i>Live Menu Inventory</h5>
                        <span class="badge rounded-pill bg-danger" id="recordCount">0 Items</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4 py-3">Code</th>
                                        <th>Dish Name</th>
                                        <th>Origninal Price</th>
                                        <th>Discount Price</th>
                                        <th>Image</th>
                                        <th class="text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="content">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
